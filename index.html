<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FretFall — Guitar Trainer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css?v=1782691613916" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">🎸</span>
        <span class="title">FretFall</span>
        <span class="tagline">play along &amp; learn</span>
      </div>
      <div class="transport">
        <button id="btnPlay" class="btn primary">▶ Play</button>
        <button id="btnRestart" class="btn">⟲ Restart</button>
        <button id="btnMic" class="btn">🎤 Enable Mic</button>
        <button id="btnMode" class="btn" title="Switch between chord strumming and individual-note picking">▦ Chords</button>
        <button id="btnAudio" class="btn" title="Play a synthesized backing track in time with the notes">🔈 Audio</button>
        <div class="bpm">
          <label>BPM <span id="bpmVal">90</span></label>
          <input id="bpm" type="range" min="20" max="220" value="90" />
        </div>
        <div class="songpick">
          <label>Song</label>
          <select id="songSelect"></select>
        </div>
        <span id="capoBadge" class="capo-badge" style="display:none">Capo 0</span>
      </div>
      <div class="scorebox">
        <div class="score"><span id="accuracy">100%</span></div>
        <div class="combo"><span id="hitCount">0</span>/<span id="playedCount">0</span> notes</div>
        <div class="detected">Heard: <span id="detected">—</span></div>
      </div>
    </header>

    <main class="stage">
      <div id="progress">
        <div id="loopRegion"></div>
        <div id="progressFill"></div>
        <div id="loopA" class="loop-handle" title="Loop start — drag">▶</div>
        <div id="loopB" class="loop-handle" title="Loop end — drag">◀</div>
      </div>
      <canvas id="highway"></canvas>
      <div id="hint" class="hint">
        <h2>Welcome to FretFall</h2>
        <p>Pick a <b>Song</b> and hit <b>Play</b> — your mic enables automatically
           (allow access when asked). Play each note/chord as it crosses the glowing line.</p>
      </div>
    </main>
  </div>

  <script src="js/songs.js?v=1782691613916"></script>
  <script src="js/chordShapes.js?v=1782691613916"></script>
  <script src="js/tabParser.js?v=1782691613916"></script>
  <script src="js/pitch.js?v=1782691613916"></script>
  <script src="js/app.js?v=1782691613916"></script>
</body>
</html>
